---
# ReviewIQ API — OpenShift Deployment
# kubectl apply -f openshift-deploy.yaml

apiVersion: apps/v1
kind: Deployment
metadata:
  name: reviewiq-api
  namespace: reviewiq
  labels:
    app: reviewiq-api
    version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: reviewiq-api
  template:
    metadata:
      labels:
        app: reviewiq-api
    spec:
      containers:
        - name: reviewiq-api
          image: image-registry.openshift-image-registry.svc:5000/reviewiq/reviewiq-api:latest
          ports:
            - containerPort: 8000
          env:
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: reviewiq-secrets
                  key: anthropic-api-key
            - name: APP_ENV
              value: "production"
            - name: DATA_DIR
              value: "/data"
            - name: MODELS_DIR
              value: "/models"
          volumeMounts:
            - name: data-volume
              mountPath: /data
              readOnly: true
            - name: models-volume
              mountPath: /models
              readOnly: true
          resources:
            requests:
              memory: "2Gi"
              cpu: "500m"
            limits:
              memory: "8Gi"
              cpu: "2000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: data-volume
          persistentVolumeClaim:
            claimName: reviewiq-data-pvc
        - name: models-volume
          persistentVolumeClaim:
            claimName: reviewiq-models-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: reviewiq-api
  namespace: reviewiq
spec:
  selector:
    app: reviewiq-api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000

---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: reviewiq-api
  namespace: reviewiq
spec:
  to:
    kind: Service
    name: reviewiq-api
  port:
    targetPort: 8000
  tls:
    termination: edge

---
# Secret (populate before applying)
apiVersion: v1
kind: Secret
metadata:
  name: reviewiq-secrets
  namespace: reviewiq
type: Opaque
stringData:
  anthropic-api-key: "YOUR_API_KEY_HERE"
