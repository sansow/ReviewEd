version: "3.9"

services:
  api:
    build: .
    container_name: reviewiq-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      # Mount data and models from host (output of notebooks)
      - ../../data:/data
      - ../../models:/models
    environment:
      - DATA_DIR=/data
      - MODELS_DIR=/models
      - APP_ENV=development
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
